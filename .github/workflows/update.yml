name: Update & Deploy Signage

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # manual "Run workflow" button in GitHub UI
  push:
    branches: [main]        # also runs whenever code is pushed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 qrcode

      - name: Generate display
        run: python update.py

      - name: Add root index redirect
        run: echo '<meta http-equiv="refresh" content="0;url=display.html">' > output/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
